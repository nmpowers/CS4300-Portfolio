<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f6f7fa"/>
      <stop offset="65%" stop-color="#eef0f4"/>
      <stop offset="65%" stop-color="#04101f"/>
      <stop offset="100%" stop-color="#01060c"/>
    </linearGradient>
    <pattern id="px" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="none"/>
      <rect width="2" height="2" x="3" y="5" fill="#0a1d3a" opacity="0.06"/>
      <rect width="2" height="2" x="9" y="10" fill="#0a1d3a" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="url(#room)"/>
  <rect width="1280" height="466" fill="url(#px)"/>

  <!-- ragged shoreline -->
  <path d="M0 468 L40 462 L80 470 L120 460 L160 472 L200 464 L240 470 L280 460 L320 472 L360 466
           L400 470 L440 460 L480 472 L520 464 L560 470 L600 460 L640 472 L680 466 L720 470 L760 460
           L800 472 L840 464 L880 470 L920 460 L960 472 L1000 466 L1040 470 L1080 460 L1120 472 L1160 464
           L1200 470 L1240 460 L1280 472 L1280 468 Z" fill="#04101f"/>

  <!-- pixelated heart (room 0 artifact) -->
  <g transform="translate(560, 180)" fill="#0a1d3a">
    <rect x="0"  y="0"  width="20" height="20"/>
    <rect x="20" y="0"  width="20" height="20"/>
    <rect x="60" y="0"  width="20" height="20"/>
    <rect x="80" y="0"  width="20" height="20"/>
    <rect x="0"  y="20" width="100" height="20"/>
    <rect x="0"  y="40" width="100" height="20"/>
    <rect x="20" y="60" width="60"  height="20"/>
    <rect x="40" y="80" width="20"  height="20"/>
  </g>

  <!-- light-blue player character (pixelated) -->
  <g transform="translate(280, 360)" fill="#aac8ff">
    <rect x="12" y="0"  width="16" height="8"/>
    <rect x="8"  y="8"  width="24" height="20"/>
    <rect x="4"  y="28" width="32" height="16"/>
  </g>

  <!-- deep-blue NPC -->
  <g transform="translate(960, 360)" fill="#04101f">
    <rect x="10" y="0"  width="20" height="8"/>
    <rect x="6"  y="8"  width="28" height="22"/>
    <rect x="2"  y="30" width="36" height="14"/>
  </g>

  <text x="640" y="650" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="44" font-style="italic"
        fill="#ffffff" letter-spacing="2">Deep Blue</text>
  <text x="640" y="690" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="18"
        fill="#aebfd6" letter-spacing="3">thumbnail placeholder — replace with a screenshot</text>
</svg>
